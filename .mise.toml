[tools]
go = "1.26.1"
golangci-lint = "2.11.3"

[tasks.build]
description = "Build crucible binary to bin/crucible"
run = """
VERSION=$(git describe --tags 2>/dev/null || echo "dev")
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
go build -ldflags "-s -w -X github.com/ryanwersal/crucible/internal/cli.version=$VERSION -X github.com/ryanwersal/crucible/internal/cli.commit=$COMMIT -X github.com/ryanwersal/crucible/internal/cli.date=$DATE" -o bin/crucible ./cmd/crucible
"""

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.fmt]
description = "Format all Go source files"
run = "gofmt -w ."

[tasks.fmt-check]
description = "Check formatting (fails if unformatted)"
run = "test -z \"$(gofmt -l .)\""

[tasks.vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.check]
description = "Run all checks (lint + test)"
depends = ["lint", "test"]

[tasks.release]
description = "Bump version (major|minor|patch), tag, and push â€” triggers GH release + Homebrew tap update"
usage = 'arg "<bump>" help="major, minor, or patch"'
run = '''
set -eu

bump="$usage_bump"
case "$bump" in
    major|minor|patch) ;;
    *)
        echo "bump must be one of: major, minor, patch (got: $bump)" >&2
        exit 1
        ;;
esac

if [ -n "$(git status --porcelain)" ]; then
    echo "Working tree is dirty. Commit or stash before releasing." >&2
    exit 1
fi

branch=$(git rev-parse --abbrev-ref HEAD)
if [ "$branch" != "main" ]; then
    echo "Not on main (on $branch). Release from main." >&2
    exit 1
fi

git fetch --tags origin main

behind=$(git rev-list --count HEAD..origin/main)
if [ "$behind" -gt 0 ]; then
    echo "Local main is $behind commits behind origin/main. Pull first." >&2
    exit 1
fi

latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
: "${latest:=v0.0.0}"
stripped=${latest#v}
major=$(echo "$stripped" | cut -d. -f1)
minor=$(echo "$stripped" | cut -d. -f2)
patch=$(echo "$stripped" | cut -d. -f3)

case "$bump" in
    major) major=$((major+1)); minor=0; patch=0 ;;
    minor) minor=$((minor+1)); patch=0 ;;
    patch) patch=$((patch+1)) ;;
esac
new="v${major}.${minor}.${patch}"

printf '\nCurrent: %s\nNew:     %s\n\n' "$latest" "$new"
printf 'Tag %s and push to origin? [y/N] ' "$new"
read -r ans
case "$ans" in
    y|Y) ;;
    *) echo "Aborted." >&2; exit 1 ;;
esac

git tag -a "$new" -m "Release $new"
git push origin main "$new"

printf '\nTag pushed. Release workflow running at:\n'
printf '  https://github.com/ryanwersal/crucible/actions\n'
'''
