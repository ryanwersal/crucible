[tools]
go = "1.26.1"
golangci-lint = "2.11.3"

[tasks.build]
description = "Build crucible binary to bin/crucible"
run = """
VERSION=$(git describe --tags 2>/dev/null || echo "dev")
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
go build -ldflags "-s -w -X github.com/ryanwersal/crucible/internal/cli.version=$VERSION -X github.com/ryanwersal/crucible/internal/cli.commit=$COMMIT -X github.com/ryanwersal/crucible/internal/cli.date=$DATE" -o bin/crucible ./cmd/crucible
"""

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.fmt]
description = "Format all Go source files"
run = "gofmt -w ."

[tasks.fmt-check]
description = "Check formatting (fails if unformatted)"
run = "test -z \"$(gofmt -l .)\""

[tasks.vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.check]
description = "Run all checks (lint + test)"
depends = ["lint", "test"]
