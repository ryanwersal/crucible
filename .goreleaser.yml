version: 2

builds:
  - main: ./cmd/crucible
    binary: crucible
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ryanwersal/crucible/internal/cli.version={{.Version}}
      - -X github.com/ryanwersal/crucible/internal/cli.commit={{.ShortCommit}}
      - -X github.com/ryanwersal/crucible/internal/cli.date={{.Date}}

archives:
  - formats: [tar.gz]
    files:
      - LICENSE

homebrew_casks:
  - name: crucible
    binaries:
      - crucible
    homepage: https://github.com/ryanwersal/crucible
    description: A declarative dotfile and system configuration manager
    license: GPL-3.0
    # Strip Gatekeeper quarantine from the unsigned binary so it runs on
    # first launch without "cannot be opened because the developer cannot
    # be verified".
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/crucible"]
          end
    repository:
      owner: ryanwersal
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
