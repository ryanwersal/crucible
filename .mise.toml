[tools]
go = "1.26.1"

[tasks.build]
description = "Build crucible binary to bin/crucible"
run = "go build -o bin/crucible ./cmd/crucible"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.fmt]
description = "Format all Go source files"
run = "gofmt -w ."

[tasks.fmt-check]
description = "Check formatting (fails if unformatted)"
run = "test -z \"$(gofmt -l .)\""

[tasks.vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.lint]
description = "Run fmt-check and vet"
depends = ["fmt-check", "vet"]

[tasks.check]
description = "Run all checks (lint + test)"
depends = ["lint", "test"]
